<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>таксометр</title>
    <style>
        body, html {
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #0e1117; /* Цвет фона под цвет темной темы Streamlit */
        }
        .container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: calc(100% + 50px); /* Делаем фрейм чуть выше экрана */
            border: none;
            margin-bottom: -50px; /* И прячем лишние 50 пикселей (полоску) за край экрана */
        }
    </style>
</head>
<body>
    <div class="container">
        <iframe src="https://nonreftax.streamlit.app/?embed=true&embed_options=disable_bar" allowfullscreen></iframe>
    </div>
</body>
</html>
